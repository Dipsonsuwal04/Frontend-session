<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List in html</title>
</head>
<body>
    <h1>List tutorial</h1>

    <h2>a. Ordered list</h2>
    <ol>
        <h1>List of students</h1>
        <li>Csit
            <ol>
                <li>Ram</li>
                <li>Hari</li>
                <li>Rohan</li>
                <li>Dipak</li>
            </ol>
        </li>
        <li>BIT
            <ol>
                <li>Gita</li>
                <li>Shyam</li>
                <li>Rahul</li>
            </ol>
        </li>
        <li>BCA 
               <ol></ol>
        </li>

    </ol>
    <h2>b. Unordered List</h2>
    <ul type="square">
        
        <li>car</li>
        <li>bus</li>
        <li>van</li>
    </ul>
</body>
</html>
